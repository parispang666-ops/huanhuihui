<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>企业信息 - 环慧慧 Web UI</title>
  <style>
    :root {
      --color-brand: #1570EF;
      --color-brand-hover: #2E90FA;
      --color-brand-active: #175CD3;
      --color-danger: #F64C41;
      --color-success: #00C5C3;
      --color-warning: #FF8340;
      --color-text-primary: #444F66;
      --color-text-secondary: #758095;
      --color-text-placeholder: #9EA4AE;
      --color-text-disabled: #B3B9C4;
      --color-bg-page: #F7F8FA;
      --color-bg-surface: #FFFFFF;
      --color-bg-muted: #F7F8F9;
      --color-brand-light: #EFF8FF;
      --color-border: #DEDFE3;
      --color-divider: #E6E7EB;
      --radius-component: 4px;
      --font-family-ui: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      --shadow-topbar: 0 1px 4px rgba(31, 42, 55, .10);
      --shadow-brand: 0 1px 5px rgba(21,112,239,.05), 0 4px 2.5px rgba(21,112,239,.08), 0 2px 2px rgba(21,112,239,.25);
      --focus-ring: 0 0 0 2px #D9E1FF;
      --color-topbar-bg: #00254A; --color-topbar-text: rgba(255,255,255,0.90); --color-topbar-sub: rgba(255,255,255,0.60);
      --color-sidebar-bg: #00254A; --color-sidebar-item-bg: #042240; --color-sidebar-active: #007AFF;
      --sidebar-width-new: 256px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      font-family: var(--font-family-ui);
      font-size: 14px;
      line-height: 22px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    img {
      display: block;
      object-fit: contain;
    }

    .app {
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg-page);
    }

    /* ==================== 顶部导航栏 ==================== */
    .menu-topbar { position: fixed; z-index: 30; top: 0; left: 0; width: 100%; height: 64px; display: flex; background: var(--color-topbar-bg); overflow: hidden; }
    .menu-logo { width: var(--sidebar-width-new); height: 64px; position: relative; display: flex; align-items: center; background: var(--color-topbar-bg); overflow: hidden; flex: 0 0 var(--sidebar-width-new); }
    .menu-logo::before { content:""; position:absolute; width:236px; height:236px; left:10px; top:-33px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.40) inset; border-radius:9999px; }
    .menu-logo::after { content:""; position:absolute; width:188px; height:188px; left:34px; top:-9px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.30) inset; border-radius:9999px; }
    .menu-logo-inner { position:absolute; width:138px; height:138px; left:59px; top:16px; background:#002449; box-shadow:0px 4px 10px rgba(0,0,0,0.20) inset; border-radius:9999px; z-index:0; }
    .menu-logo-icon { position:absolute; left:28px; top:8px; width:48px; height:48px; z-index:1; }
    .menu-logo-icon img { width:48px; height:48px; }
    .menu-logo-main { position:absolute; left:88px; top:16px; z-index:1; font-size:20px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-text); white-space:nowrap; }
    .menu-logo-brand { color:rgba(58,184,255,0.90); }
    .menu-logo-sub { position:absolute; left:87px; top:39px; z-index:1; font-size:12px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-sub); white-space:nowrap; }
    .menu-logo-sep { position:absolute; left:148px; top:27px; width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.30); }
    .menu-top-nav { flex:1; min-width:0; height:64px; display:flex; align-items:center; background:var(--color-topbar-bg); }
    .menu-top-track { height:64px; display:flex; align-items:center; gap:32px; padding:0 16px; }
    .menu-top-item { height:46px; display:inline-flex; align-items:center; padding:0; border:none; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; }
    .menu-top-item.is-active { border-bottom-color:var(--color-sidebar-active); }
    .menu-top-actions { height:64px; display:flex; align-items:center; padding:0 16px 0 12px; color:var(--color-topbar-text); font-size:12px; font-family:var(--font-family-ui); white-space:nowrap; flex-shrink:0; }
    .menu-actions-icons { display:none; }
    .menu-icon-btn { display:none; }
    .menu-user { display:inline-flex; align-items:center; gap:0; color:var(--color-topbar-text); font-size:12px; white-space:nowrap; }
    .menu-user-avatar { display:none; }
    .menu-user-meta { height:24px; display:inline-flex; align-items:center; }
    .menu-user-arrow { display:none; }

    /* ==================== 侧边导航菜单 ==================== */
    .menu-shell { position:fixed; z-index:20; top:64px; left:0; width:var(--sidebar-width-new); height:calc(100vh - 64px); display:flex; flex-direction:column; justify-content:flex-start; background:var(--color-sidebar-bg); box-shadow:0px 2px 8px rgba(0,0,0,0.25); }
    .menu-side-list { display:flex; flex-direction:column; margin:0; padding:0; overflow:hidden auto; scrollbar-width:thin; }
    .menu-side-list::-webkit-scrollbar { width:3px; }
    .menu-side-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:50px; }
    .menu-side-item { width:256px; height:52px; display:flex; align-items:center; gap:12px; padding:0 8px 0 24px; border:none; border-radius:0; background:var(--color-sidebar-bg); color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; }
    .menu-side-item:hover { background:rgba(255,255,255,0.06); }
    .menu-side-item img { width:20px; height:20px; flex:0 0 auto; }
    .menu-side-item .menu-side-arrow { width:16px; height:16px; flex:0 0 auto; margin-left:auto; margin-right:12px; }
    .menu-side-item .menu-side-arrow img { width:16px; height:16px; }
    .menu-side-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .menu-sublist { display:none; flex-direction:column; margin:0; padding:0; background:var(--color-sidebar-item-bg); }
    .menu-sublist.is-open { display:flex; }
    .menu-side-child { width:240px; height:36px; display:flex; align-items:center; margin:8px; padding:0 0 0 36px; border:none; border-radius:4px; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; white-space:nowrap; position:relative; }
    .menu-side-child::before { content:""; position:absolute; left:16px; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.40); }
    .menu-side-child:hover { background:rgba(255,255,255,0.08); }
    .menu-side-child.is-active { background:var(--color-sidebar-active); color:white; }
    .menu-side-child.is-active::before { background:white; }
    .menu-collapse { display:none; }

    /* ==================== 面包屑栏 ==================== */
    .menu-breadcrumb { position:fixed; z-index:9; top:64px; left:var(--sidebar-width-new); right:0; height:50px; display:flex; align-items:center; padding:0 24px; background:white; box-shadow:0px 0px 8px 6px rgba(0,0,0,0.02); }
    .menu-breadcrumb-path { display:inline-flex; align-items:center; height:34px; }
    .menu-breadcrumb-icon { width:24px; height:34px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .menu-breadcrumb-icon img { width:12px; height:12px; }
    .menu-breadcrumb-tag { display:inline-flex; align-items:center; height:34px; padding:0 0 0 8px; background:#E5F3FF; border-radius:0; }
    .menu-breadcrumb-tag svg { width:12px; height:12px; flex:0 0 auto; }
    .menu-breadcrumb-tag span { color:#007AFF; font-size:14px; font-family:var(--font-family-ui); font-weight:400; margin:0 4px; }
    .menu-breadcrumb-next { width:24px; height:34px; display:inline-flex; align-items:center; justify-content:center; color:#9EA4AE; flex:0 0 auto; }
    .menu-breadcrumb-next img { width:12px; height:12px; }

    /* ==================== 页面主体 ==================== */
    .page {
      min-width: 0;
      height: 100vh;
      margin-left: var(--sidebar-width-new);
      padding: 126px 12px 12px;
      overflow: hidden;
    }

    .form-panel {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0px 0px 8px 6px rgba(0,0,0,0.02);
    }

    .form-header {
      width: 100%;
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      padding: 12px 24px;
      border-bottom: 1px solid var(--color-divider);
      background: #fff;
      border-radius: 4px 4px 0 0;
    }

    .icon-svg {
      width: 16px;
      height: 16px;
      display: inline-block;
      flex: 0 0 16px;
    }

    .form-title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: 18px;
      line-height: 26px;
      font-weight: 400 !important;
      font-synthesis: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-title::before { display: none; }

    .form-header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 32px 24px 24px;
      scrollbar-color: var(--color-divider) transparent;
      scrollbar-width: thin;
    }

    .form-body::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    .form-body::-webkit-scrollbar-button {
      width: 0;
      height: 0;
      display: none;
    }

    .form-body::-webkit-scrollbar-track { background: transparent; }

    .form-body::-webkit-scrollbar-thumb {
      border-radius: 50px;
      background: var(--color-divider);
    }

    .form-content {
      width: min(800px, 100%);
      margin: 0 auto;
    }

    .form-section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 24px;
      margin-bottom: 8px;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
    }

    .form-section-title::before {
      content: "";
      width: 3px;
      height: 14px;
      background: var(--color-brand);
    }

    .form-section {
      margin-bottom: 32px;
    }

    .form-section:last-child { margin-bottom: 0; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0 32px;
    }

    .form-item {
      min-width: 0;
      padding-bottom: 24px;
    }

    .form-item.no-gap { padding-bottom: 0; }

    .form-item.full {
      grid-column: 1 / -1;
    }

    .form-label {
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding-bottom: 8px;
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 22px;
      white-space: nowrap;
    }

    .required {
      color: var(--color-danger);
      font-weight: 600;
    }

    .form-help {
      width: 16px;
      height: 16px;
      color: var(--color-text-placeholder);
    }

    .field-control,
    .field-select,
    .textarea-control {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-component);
      background: #fff;
      color: var(--color-text-primary);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .field-control,
    .field-select {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
    }

    .field-control:hover,
    .field-select:hover,
    .textarea-control:hover {
      border-color: var(--color-brand);
    }

    .field-control:focus-within,
    .field-select:focus,
    .field-select:focus-visible,
    .textarea-control:focus {
      border-color: var(--color-brand);
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .field-input,
    .textarea-control {
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 22px;
    }

    .field-input {
      width: 100%;
      min-width: 0;
      height: 22px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
    }

    .field-input::placeholder,
    .textarea-control::placeholder,
    .field-placeholder {
      color: var(--color-text-placeholder);
    }

    .field-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      color: var(--color-text-placeholder);
    }

    .field-select {
      justify-content: space-between;
      color: var(--color-text-placeholder);
    }

    .field-select span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-select.has-value span { color: var(--color-text-primary); }

    .helper-text {
      margin: 2px 0 0;
      color: var(--color-text-placeholder);
      font-size: 12px;
      line-height: 20px;
    }

    /* ==================== 只读字段 ==================== */
    .field-control.readonly {
      background: var(--color-bg-muted);
      border-color: var(--color-border);
      cursor: not-allowed;
    }

    .field-control.readonly .field-input {
      color: var(--color-text-secondary);
      cursor: not-allowed;
    }

    .field-control.readonly:hover {
      border-color: var(--color-border);
    }

    .readonly-icon {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      color: var(--color-text-disabled);
    }

    .readonly-tip {
      font-size: 12px;
      color: var(--color-text-disabled);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ==================== 只读模式 - 平文本展示 ==================== */
    .form-panel.is-readonly .field-control,
    .form-panel.is-readonly .field-select,
    .form-panel.is-readonly .cascade-select {
      border-color: transparent !important;
      background: transparent !important;
      pointer-events: none !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      box-shadow: none !important;
    }

    .form-panel.is-readonly .field-icon { display: none; }

    .form-panel.is-readonly .field-input,
    .form-panel.is-readonly .field-select span,
    .form-panel.is-readonly .cascade-select span {
      color: var(--color-text-primary) !important;
      -webkit-text-fill-color: var(--color-text-primary) !important;
      opacity: 1 !important;
    }

    .form-panel.is-readonly .field-select:not(.has-value) span,
    .form-panel.is-readonly .cascade-select:not(.has-value) span {
      color: var(--color-text-disabled) !important;
      -webkit-text-fill-color: var(--color-text-disabled) !important;
    }

    .form-panel.is-readonly .choice { display: none; }
    .form-panel.is-readonly .choice:has(.radio.checked),
    .form-panel.is-readonly .choice:has(.check.checked) {
      display: inline-flex;
      color: var(--color-text-primary) !important;
      pointer-events: none;
    }
    .form-panel.is-readonly .choice .radio,
    .form-panel.is-readonly .choice .check { display: none; }

    .form-panel.is-readonly .person-select-group .btn-sm { display: none; }

    .form-panel.is-readonly .readonly-icon { display: none; }

    /* ==================== 单选/多选 ==================== */
    .choice-group {
      min-height: 22px;
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px 16px;
      padding-top: 0;
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-text-secondary);
      white-space: nowrap;
      cursor: pointer;
    }

    .radio,
    .check {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 16px;
      border: 1px solid #D2D6DC;
      background: #fff;
      transition: border-color 150ms ease, background-color 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    .radio {
      border-radius: 50%;
    }

    .choice:hover .radio:not(.checked),
    .choice:hover .check:not(.checked):not(.indeterminate) {
      border-color: var(--color-brand);
      background: var(--color-bg-muted);
    }

    .choice:active .radio:not(.checked),
    .choice:active .check:not(.checked):not(.indeterminate) {
      border-color: var(--color-brand-active);
      background: var(--color-bg-muted);
    }

    .choice:focus-visible {
      outline: none;
    }

    .choice:focus-visible .radio,
    .choice:focus-visible .check {
      border-color: var(--color-brand);
      box-shadow: var(--focus-ring);
    }

    .radio.checked {
      border-color: var(--color-brand);
    }

    .radio.checked::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-brand);
    }

    .check {
      border-radius: 3px;
    }

    .check.checked {
      border-color: var(--color-brand);
      background: var(--color-brand);
    }

    .check.checked::after {
      content: "";
      width: 7px;
      height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(.5px, -1px);
    }

    /* 只读模式：地址拼接文本 */
    .address-readonly-text {
      display: none;
      height: 32px;
      line-height: 32px;
      color: var(--color-text-primary);
      font-size: 14px;
    }

    .form-panel.is-readonly .address-combined .cascade-select-group,
    .form-panel.is-readonly .address-combined .field-control { display: none !important; }

    .form-panel.is-readonly .address-readonly-text { display: block; }

    /* ==================== 省市区三级联动选择器 ==================== */
    .cascade-select-group {
      display: flex;
      gap: 8px;
    }

    .cascade-select {
      flex: 1;
      min-width: 0;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-component);
      background: #fff;
      color: var(--color-text-placeholder);
      cursor: pointer;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .cascade-select:hover { border-color: var(--color-brand); }
    .cascade-select:focus,
    .cascade-select:focus-visible {
      border-color: var(--color-brand);
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .cascade-select.has-value { color: var(--color-text-primary); }
    .cascade-select.disabled {
      background: var(--color-bg-muted);
      color: var(--color-text-disabled);
      cursor: not-allowed;
      pointer-events: none;
    }

    .cascade-select span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ==================== 人员选择器按钮 ==================== */
    .person-select-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .person-select-group .field-control {
      flex: 1;
      min-width: 0;
    }

    .btn {
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 5px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius-component);
      background: #fff;
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 22px;
      white-space: nowrap;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease;
    }

    .btn.primary {
      color: #fff;
      background: var(--color-brand);
      border-color: var(--color-brand);
    }

    .btn.primary:hover {
      background: var(--color-brand-hover);
      border-color: var(--color-brand-hover);
    }

    .btn.primary:active {
      background: var(--color-brand-active);
      border-color: var(--color-brand-active);
    }

    .btn.neutral {
      color: var(--color-text-primary);
      background: #fff;
      border-color: var(--color-border);
    }

    .btn.neutral:hover {
      background: var(--color-bg-muted);
    }

    .btn.danger {
      color: var(--color-danger);
      background: #fff;
      border-color: var(--color-danger);
    }

    .btn.danger:hover {
      color: #fff;
      background: var(--color-danger);
    }

    .btn-sm {
      height: 32px;
      padding: 5px 12px;
      flex: 0 0 auto;
    }

    /* ==================== 数字输入框 ==================== */
    .field-input[type="number"] {
      -moz-appearance: textfield;
    }

    .field-input[type="number"]::-webkit-outer-spin-button,
    .field-input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* ==================== 字段校验错误态 ==================== */
    .form-item.has-error .field-control,
    .form-item.has-error .field-select,
    .form-item.has-error .textarea-control,
    .form-item.has-error .cascade-select {
      border-color: var(--color-danger);
    }

    .form-item.has-error .field-control:focus-within {
      box-shadow: 0 0 0 2px rgba(246, 76, 65, 0.2);
    }

    .field-error {
      margin: 2px 0 0;
      color: var(--color-danger);

        '怀柔区':'110116','平谷区':'110117','密云区':'110118','延庆区':'110119'
      }}

        '黄浦区':'310101','徐汇区':'310104','长宁区':'310105','静安区':'310106',
        '普陀区':'310107','虹口区':'310109','杨浦区':'310110','闵行区':'310112',

      }}
    }}
  };

  function getAreaChildren(province, city) {
    var p = areaCodeMap[province];
    if (!p) return null;
    if (!city) return { code: p.code, children: p.children };
    var c = p.children[city];
    if (!c) return null;
    return { code: c.code, children: c.children || {} };
  }

  function getAreaCode(province, city, district) {
    var p = areaCodeMap[province];
    if (!p) return '';
    if (!city) return p.code;
    var c = p.children[city];
    if (!c) return p.code;
    if (!district) return c.code;
    return c.children[district] || c.code;
  }

  // ==================== 2. 自定义下拉选择器 ====================
  function initDropdowns() {
    document.addEventListener('click', function(e) {
      $$('.dropdown-panel.is-open').forEach(function(panel) {
        var wrapper = panel.closest('.dropdown-wrapper');
        if (wrapper && !wrapper.contains(e.target)) {
          panel.classList.remove('is-open');
        }
      });
    });

    $$('.field-select').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var wrapper = btn.closest('.dropdown-wrapper');
        if (!wrapper) return;
        var panel = wrapper.querySelector('.dropdown-panel');
        if (!panel) return;
        var isOpen = panel.classList.contains('is-open');
        // close all
        $$('.dropdown-panel.is-open').forEach(function(p) { p.classList.remove('is-open'); });
        if (!isOpen) {
          // Check space below
          var rect = wrapper.getBoundingClientRect();
          var spaceBelow = window.innerHeight - rect.bottom;
          if (spaceBelow < 220 && rect.top > 220) {
            panel.classList.add('drop-up');
          } else {
            panel.classList.remove('drop-up');
          }
          panel.classList.add('is-open');
        }
      });
    });

    $$('.dropdown-option').forEach(function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        var wrapper = opt.closest('.dropdown-wrapper');
        var btn = wrapper.querySelector('.field-select');
        var panel = wrapper.querySelector('.dropdown-panel');
        var value = opt.getAttribute('data-value');
        var text = opt.textContent.trim();
        // update button
        var span = btn.querySelector('span');
        span.textContent = text;
        btn.classList.add('has-value');
        btn.setAttribute('data-selected-value', value);
        // update panel
        $$('.dropdown-option', panel).forEach(function(o) { o.classList.remove('selected'); });
        opt.classList.add('selected');
        panel.classList.remove('is-open');
      });
    });
  }

  // ==================== 3. 省市区三级联动 ====================
  function initCascadeSelects() {
    $$('.cascade-select').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (btn.classList.contains('disabled')) return;
        var group = btn.getAttribute('data-group');
        var level = btn.getAttribute('data-level');
        openCascadePanel(btn, group, level);
      });
    });
  }

  function openCascadePanel(btn, group, level) {
    // Remove any existing cascade panels
    var existing = document.querySelector('.cascade-dropdown-panel');
    if (existing) existing.remove();

    var items = [];
    if (level === 'province') {
      items = Object.keys(areaCodeMap);
    } else if (level === 'city') {
      var provBtn = document.querySelector('.cascade-select[data-group="' + group + '"][data-level="province"]');
      var provName = provBtn ? provBtn.querySelector('span').textContent.trim() : '';
      if (provName === '请选择省') return;
      var data = getAreaChildren(provName);
      if (data && data.children) items = Object.keys(data.children);
    } else if (level === 'district') {
      var provBtn = document.querySelector('.cascade-select[data-group="' + group + '"][data-level="province"]');
      var cityBtn = document.querySelector('.cascade-select[data-group="' + group + '"][data-level="city"]');
      var provName = provBtn ? provBtn.querySelector('span').textContent.trim() : '';
      var cityName = cityBtn ? cityBtn.querySelector('span').textContent.trim() : '';
      if (provName === '请选择省' || cityName === '请选择市') return;
      var data = getAreaChildren(provName, cityName);
      if (data && data.children) items = Object.keys(data.children);
    }

    if (items.length === 0) return;

    var rect = btn.getBoundingClientRect();
    var panel = document.createElement('div');
    panel.className = 'dropdown-panel is-open cascade-dropdown-panel';
    panel.style.cssText = 'position:fixed; z-index:60; left:' + rect.left + 'px; top:' + (rect.bottom + 4) + 'px; width:' + rect.width + 'px; max-height:200px; overflow:auto;';
    // Check if fits below
    if (rect.bottom + 204 > window.innerHeight && rect.top > 200) {
      panel.style.top = (rect.top - 204) + 'px';
    }

    items.forEach(function(name) {
      var opt = document.createElement('div');
      opt.className = 'dropdown-option';
      opt.textContent = name;
      opt.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var span = btn.querySelector('span');
        span.textContent = name;
        btn.classList.add('has-value');
        btn.setAttribute('data-selected-value', name);

        // cascade clear downstream
        if (level === 'province') {
          clearCascadeDown(group, 'city');
          clearCascadeDown(group, 'district');
          enableCascade(group, 'city');
        } else if (level === 'city') {
          clearCascadeDown(group, 'district');
          enableCascade(group, 'district');
        }
        panel.remove();
      });
      panel.appendChild(opt);
    });

    document.body.appendChild(panel);

    // close on outside click
    var closeHandler = function(ev) {
      if (!panel.contains(ev.target) && ev.target !== btn) {
        panel.remove();
        document.removeEventListener('click', closeHandler);
      }
    };
    setTimeout(function() { document.addEventListener('click', closeHandler); }, 0);
  }

  function clearCascadeDown(group, level) {
    var btn = document.querySelector('.cascade-select[data-group="' + group + '"][data-level="' + level + '"]');
    if (btn) {
      btn.querySelector('span').textContent = (level === 'city' ? '请选择市' : '请选择区/县');
      btn.classList.remove('has-value');
      btn.classList.add('disabled');
      btn.removeAttribute('data-selected-value');
    }
  }

  function enableCascade(group, level) {
    var btn = document.querySelector('.cascade-select[data-group="' + group + '"][data-level="' + level + '"]');
    if (btn) btn.classList.remove('disabled');
  }

  // ==================== 4. 单选按钮组 ====================
  function initChoiceGroups() {
    $$('.choice-group').forEach(function(group) {
      var field = group.getAttribute('data-field');
      var choices = $$('.choice', group);
      choices.forEach(function(choice) {
        choice.addEventListener('click', function() {
          choices.forEach(function(c) {
            c.querySelector('.radio').classList.remove('checked');
          });
          choice.querySelector('.radio').classList.add('checked');
          // Fire change event
          if (field === 'isFourOne') {
            handleIsFourOneChange(choice.textContent.trim());
          }
        });
      });
    });
  }

  function handleIsFourOneChange(value) {
    var container = document.getElementById('conditionalFourOneType');
    if (value === '是') {
      container.classList.add('visible');

      container.classList.remove('visible');

      var btn = document.getElementById('fourOneType');

        btn.querySelector('span').textContent = '请选择';
        btn.classList.remove('has-value');
        btn.removeAttribute('data-selected-value');
        var panel = btn.closest('.dropdown-wrapper').querySelector('.dropdown-panel');
        if (panel) $$('.dropdown-option', panel).forEach(function(o) { o.classList.remove('selected'); });
      }
    }
  }

    overlay.innerHTML = '<div class="modal">' +

  function openPersonModal() {
    if (!personModal) createPersonModal();

    document.getElementById('personSearch').value = '';
    renderPersonTable();
  }

  function closePersonModal() {
    if (personModal) personModal.classList.remove('is-open');
  }

  function renderPersonTable() {
    var search = (document.getElementById('personSearch').value || '').trim().toLowerCase();
    var filtered = mockPersons.filter(function(p) {
      return !search || p.name.toLowerCase().includes(search) || p.id.toLowerCase().includes(search);
    });
    var body = document.getElementById('personModalBody');
    if (filtered.length === 0) {
      body.innerHTML = '<div class="modal-empty">暂无匹配人员</div>';
      return;
    }
    var html = '<table class="modal-table"><thead><tr>' +
      '<th class="col-radio"></th>' +
      '<th>姓名</th><th>工号</th><th>部门</th><th>手机号</th>' +
    '</tr></thead><tbody>';
    filtered.forEach(function(p, idx) {
      var sel = state.selectedPerson && state.selectedPerson.id === p.id;
      html += '<tr class="' + (sel ? 'selected' : '') + '" data-idx="' + idx + '">' +
        '<td class="col-radio"><span class="radio' + (sel ? ' checked' : '') + '"></span></td>' +
        '<td>' + p.name + '</td><td>' + p.id + '</td><td>' + p.dept + '</td><td>' + p.phone + '</td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;

    // bind row click
    $$('tr[data-idx]', body).forEach(function(row) {
      row.addEventListener('click', function() {
        var idx = parseInt(row.getAttribute('data-idx'));
        state.selectedPerson = filtered[idx];
        // update visual
        $$('tr[data-idx]', body).forEach(function(r) { r.classList.remove('selected'); });
        row.classList.add('selected');
        $$('.radio', body).forEach(function(r) { r.classList.remove('checked'); });
        row.querySelector('.radio').classList.add('checked');
      });
    });
  }

  function confirmPersonSelection() {
    if (!state.selectedPerson) {
      alert('请先选择一位人员');
      return;
    }
    document.getElementById('managerName').value = state.selectedPerson.name;
    document.getElementById('managerPhone').value = state.selectedPerson.phone;
    closePersonModal();
  }

    item.classList.add('has-error');

    // managerName

    check('managerName', '主要负责人', !!mgrName, '主要负责人不能为空');

      firstError.focus({ preventScroll: true });

  function buildPayload() {

      safeLevel: safeLevel,
      isFourOne: isFourOne
    };
    if (isFourOne === '1') {
      payload.fourOneType = fourOneType;
    }
    return payload;
  }

  function md5(str) {
    // Simple MD5 implementation (for signature simulation)
    function rshift(num, bits) { return Math.floor(num / Math.pow(2, bits)); }
    function safeAdd(x, y) {
      var lsw = (x & 0xFFFF) + (y & 0xFFFF);
      var msw = (x >> 16) + (y >> 16) + (lsw >> 16);
      return (msw << 16) | (lsw & 0xFFFF);
    }
    function bitwiseRotate(num, cnt) {
      return (num << cnt) | rshift(num, 32 - cnt);
    }
    function md5cmn(q, a, b, x, s, t) {
      return safeAdd(bitwiseRotate(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b);
    }
    function md5ff(a, b, c, d, x, s, t) { return md5cmn((b & c) | ((~b) & d), a, b, x, s, t); }
    function md5gg(a, b, c, d, x, s, t) { return md5cmn((b & d) | (c & (~d)), a, b, x, s, t); }
    function md5hh(a, b, c, d, x, s, t) { return md5cmn(b ^ c ^ d, a, b, x, s, t); }
    function md5ii(a, b, c, d, x, s, t) { return md5cmn(c ^ (b | (~d)), a, b, x, s, t); }

    function convertToWordArray(str) {
      var len = str.length;
      var words = [];
      for (var i = 0; i < len; i++) {
        words[i >> 2] |= (str.charCodeAt(i) & 0xFF) << ((i % 4) << 3);
      }
      words[len >> 2] |= 0x80 << ((len % 4) << 3);
      var paddingLen = (((len + 8) >> 6) + 1) << 4;
      for (var j = (len >> 2) + 1; j < paddingLen; j++) words[j] = 0;
      words[paddingLen - 2] = len << 3;
      words[paddingLen - 1] = len >>> 29;
      return words;
    }

    function wordToHex(val) {
      var hex = '';
      for (var i = 0; i <= 3; i++) {
        var b = (val >>> (i * 8)) & 0xFF;
        hex += ('0' + b.toString(16)).slice(-2);
      }
      return hex;
    }

    var x = convertToWordArray(unescape(encodeURIComponent(str)));
    var a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;

    for (var k = 0; k < x.length; k += 16) {
      var AA = a, BB = b, CC = c, DD = d;
      a = md5ff(a, b, c, d, x[k+0], 7, 0xD76AA478);
      d = md5ff(d, a, b, c, x[k+1], 12, 0xE8C7B756);
      c = md5ff(c, d, a, b, x[k+2], 17, 0x242070DB);
      b = md5ff(b, c, d, a, x[k+3], 22, 0xC1BDCEEE);
      a = md5ff(a, b, c, d, x[k+4], 7, 0xF57C0FAF);
      d = md5ff(d, a, b, c, x[k+5], 12, 0x4787C62A);
      c = md5ff(c, d, a, b, x[k+6], 17, 0xA8304613);
      b = md5ff(b, c, d, a, x[k+7], 22, 0xFD469501);
      a = md5ff(a, b, c, d, x[k+8], 7, 0x698098D8);
      d = md5ff(d, a, b, c, x[k+9], 12, 0x8B44F7AF);
      c = md5ff(c, d, a, b, x[k+10], 17, 0xFFFF5BB1);
      b = md5ff(b, c, d, a, x[k+11], 22, 0x895CD7BE);
      a = md5ff(a, b, c, d, x[k+12], 7, 0x6B901122);
      d = md5ff(d, a, b, c, x[k+13], 12, 0xFD987193);
      c = md5ff(c, d, a, b, x[k+14], 17, 0xA679438E);
      b = md5ff(b, c, d, a, x[k+15], 22, 0x49B40821);
      a = md5gg(a, b, c, d, x[k+1], 5, 0xF61E2562);
      d = md5gg(d, a, b, c, x[k+6], 9, 0xC040B340);
      c = md5gg(c, d, a, b, x[k+11], 14, 0x265E5A51);
      b = md5gg(b, c, d, a, x[k+0], 20, 0xE9B6C7AA);
      a = md5gg(a, b, c, d, x[k+5], 5, 0xD62F105D);
      d = md5gg(d, a, b, c, x[k+10], 9, 0x2441453);
      c = md5gg(c, d, a, b, x[k+15], 14, 0xD8A1E681);
      b = md5gg(b, c, d, a, x[k+4], 20, 0xE7D3FBC8);
      a = md5gg(a, b, c, d, x[k+9], 5, 0x21E1CDE6);
      d = md5gg(d, a, b, c, x[k+14], 9, 0xC33707D6);
      c = md5gg(c, d, a, b, x[k+3], 14, 0xF4D50D87);
      b = md5gg(b, c, d, a, x[k+8], 20, 0x455A14ED);
      a = md5gg(a, b, c, d, x[k+13], 5, 0xA9E3E905);
      d = md5gg(d, a, b, c, x[k+2], 9, 0xFCEFA3F8);

      b = md5hh(b, c, d, a, x[k+14], 23, 0xFDE5380C);
      a = md5hh(a, b, c, d, x[k+1], 4, 0xA4BEEA44);
      d = md5hh(d, a, b, c, x[k+4], 11, 0x4BDECFA9);
      c = md5hh(c, d, a, b, x[k+7], 16, 0xF6BB4B60);
      b = md5hh(b, c, d, a, x[k+10], 23, 0xBEBFBC70);
      a = md5hh(a, b, c, d, x[k+13], 4, 0x289B7EC6);
      d = md5hh(d, a, b, c, x[k+0], 11, 0xEAA127FA);

      c = md5hh(c, d, a, b, x[k+15], 16, 0x1FA27CF8);

      b = md5ii(b, c, d, a, x[k+5], 21, 0xFC93A039);
      a = md5ii(a, b, c, d, x[k+12], 6, 0x655B59C3);
      d = md5ii(d, a, b, c, x[k+3], 10, 0x8F0CCC92);
      c = md5ii(c, d, a, b, x[k+10], 15, 0xFFEFF47D);
      b = md5ii(b, c, d, a, x[k+1], 21, 0x85845DD1);
      a = md5ii(a, b, c, d, x[k+8], 6, 0x6FA87E4F);
      d = md5ii(d, a, b, c, x[k+15], 10, 0xFE2CE6E0);
      c = md5ii(c, d, a, b, x[k+6], 15, 0xA3014314);
      b = md5ii(b, c, d, a, x[k+13], 21, 0x4E0811A1);

      d = md5ii(d, a, b, c, x[k+11], 10, 0xBD3AF235);
      c = md5ii(c, d, a, b, x[k+2], 15, 0x2AD7D2BB);
      b = md5ii(b, c, d, a, x[k+9], 21, 0xEB86D391);
      a = safeAdd(a, AA);
      b = safeAdd(b, BB);
      c = safeAdd(c, CC);
      d = safeAdd(d, DD);
    }
    return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
  }

  function generateSign(timestamp, nonce) {
    var secretKey = 'eito_secret_key_2024'; // 模拟密钥
    var raw = 'eito' + timestamp + nonce + secretKey;
    return md5(raw);
  }

  function doSave() {
    if (!validateForm()) return;
    var payload = buildPayload();
    var timestamp = Date.now();
    var nonce = '';
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    for (var i = 0; i < 10; i++) nonce += chars.charAt(Math.floor(Math.random() * chars.length));
    var sign = generateSign(timestamp, nonce);

    // Build request
    var headers = {
      'Content-Type': 'application/json;charset=UTF-8',
      'timestamp': '' + timestamp,
      'nonce': nonce,
      'accessKey': 'hwh_ehs_2024',
      'sign': sign
    };

    console.log('[企业信息配置] POST /company/data/register');
    console.log('Headers:', JSON.stringify(headers, null, 2));
    console.log('Payload:', JSON.stringify(payload, null, 2));

    // Simulate POST (in production use fetch/XHR)
    try {
      // 模拟成功响应
      alert('保存成功！');
      // Save to localStorage
      try {
        localStorage.setItem('enterprise_form_data', JSON.stringify(payload));
        localStorage.setItem('enterprise_form_headers', JSON.stringify(headers));
      } catch(e) {}
    } catch(e) {
      alert('提交失败：' + (e.message || '网络异常'));
    }
  }

    if (data.fourOneType) selectDropdownOption('fourOneType', data.fourOneType);

  function selectDropdownOption(fieldId, value) {
    var btn = document.getElementById(fieldId);
    if (!btn) return;
    var wrapper = btn.closest('.dropdown-wrapper');
    if (!wrapper) return;
    var panel = wrapper.querySelector('.dropdown-panel');
    var opts = panel ? $$('.dropdown-option', panel) : [];
    var found = null;
    opts.forEach(function(o) {
      if (o.getAttribute('data-value') === value) found = o;
    });
    if (found) {
      btn.querySelector('span').textContent = found.textContent.trim();
      btn.classList.add('has-value');
      btn.setAttribute('data-selected-value', value);
      opts.forEach(function(o) { o.classList.remove('selected'); });
      found.classList.add('selected');
    }
  }

  function setChoiceValue(field, value) {
    var group = document.querySelector('.choice-group[data-field="' + field + '"]');
    if (!group) return;
    var choices = $$('.choice', group);
    choices.forEach(function(c) {
      var radio = c.querySelector('.radio');
      if (c.textContent.trim() === value) {
        radio.classList.add('checked');
      } else {
        radio.classList.remove('checked');
      }
    });
    if (field === 'isFourOne') {
      handleIsFourOneChange(value);
    }
  }

  // 浮窗创建与管理
  var openTooltips = {};

  function createTooltip(badgeId) {
    if (openTooltips[badgeId]) return openTooltips[badgeId];
    var content = tooltipContents[badgeId];
    if (!content) return null;

    var tip = document.createElement('div');
    tip.className = 'prd-tooltip';
    tip.setAttribute('data-badge-id', badgeId);
    tip.innerHTML = content;
    document.body.appendChild(tip);

    // Close button
    var closeBtn = tip.querySelector('.prd-tooltip-close');
    if (closeBtn) {
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        closeTooltip(badgeId);
      });
    }

    // Prevent events on tooltip
    tip.addEventListener('click', function(e) { e.stopPropagation(); });

    // Drag
    var header = tip.querySelector('.prd-tooltip-header');
    if (header) {
      var isDragging = false, startX, startY, origLeft, origTop;
      header.addEventListener('mousedown', function(e) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        var rect = tip.getBoundingClientRect();
        origLeft = rect.left;
        origTop = rect.top;
        tip.style.transition = 'none';
        e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        var dx = e.clientX - startX;
        var dy = e.clientY - startY;
        tip.style.left = (origLeft + dx) + 'px';
        tip.style.top = (origTop + dy) + 'px';
      });
      document.addEventListener('mouseup', function() {
        if (isDragging) {
          isDragging = false;
          tip.style.transition = '';
        }
      });
    }

    openTooltips[badgeId] = tip;
    return tip;
  }

  function closeTooltip(badgeId) {
    var tip = openTooltips[badgeId];
    if (tip) {
      tip.classList.remove('is-open');
      tip.remove();
      delete openTooltips[badgeId];
    }
  }

  function positionTooltip(tip, badge) {
    var badgeRect = badge.getBoundingClientRect();
    var tipW = 450;
    var left = badgeRect.right + 4;
    var top = badgeRect.top - 4;

    // Check right overflow
    if (left + tipW > window.innerWidth - 16) {
      left = badgeRect.left - tipW - 4;
    }
    if (left < 8) left = 8;

    // Check bottom overflow
    var maxH = 420;
    if (top + maxH > window.innerHeight - 16) {
      top = window.innerHeight - maxH - 16;
    }
    if (top < 8) top = 8;

    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }

  function showTooltip(badgeId, badge) {
    var tip = createTooltip(badgeId);
    if (!tip) return;
    positionTooltip(tip, badge);
    tip.classList.add('is-open');
  }

  function hideTooltip(badgeId) {
    closeTooltip(badgeId);
  }

  // 绑定角标事件
  function bindBadgeEvents() {
    $$('.prd-badge').forEach(function(badge) {
      if (badge.hasAttribute('data-bound')) return;
      badge.setAttribute('data-bound', '1');
      var badgeId = parseInt(badge.getAttribute('data-badge-id'));
      if (!badgeId) return;

      badge.addEventListener('mouseenter', function(e) {
        e.stopPropagation();
        showTooltip(badgeId, badge);
      });

      badge.addEventListener('mouseleave', function(e) {
        // Don't close immediately - allow moving to tooltip
        setTimeout(function() {
          var tip = openTooltips[badgeId];
          if (tip && !tip.matches(':hover')) {
            // Check if mouse is over the tooltip
          }
        }, 100);
      });
    });
  }

  // 全局点击关闭浮窗（但点击角标本身不关闭）
  document.addEventListener('click', function(e) {
    var clickedOnBadge = e.target.closest('.prd-badge');
    var clickedOnTooltip = e.target.closest('.prd-tooltip');
    if (!clickedOnBadge && !clickedOnTooltip) {
      Object.keys(openTooltips).forEach(function(id) {
        closeTooltip(parseInt(id));
      });
    }
  });

  // ==================== 10. PRD 抽屉 ====================
  function createPrdDrawer() {
    // Overlay
    var overlay = document.createElement('div');
    overlay.className = 'prd-drawer-overlay';
    overlay.id = 'prdDrawerOverlay';
    document.body.appendChild(overlay);

    // Drawer
    var drawer = document.createElement('div');
    drawer.className = 'prd-drawer';
    drawer.id = 'prdDrawer';
    drawer.innerHTML = '<div class="prd-drawer-header">' +
      '<span class="prd-drawer-title">PRD 说明</span>' +
      '<button class="prd-drawer-close">&times;</button>' +
    '</div>' +
    '<div class="prd-drawer-tabs">' +
      '<div class="prd-drawer-tab is-active" data-tab="page">页面 PRD</div>' +
      '<div class="prd-drawer-tab" data-tab="global">整体 PRD</div>' +
    '</div>' +
    '<div class="prd-drawer-content" id="prdDrawerContent"></div>';
    document.body.appendChild(drawer);

    // Events
    overlay.addEventListener('click', closePrdDrawer);
    drawer.querySelector('.prd-drawer-close').addEventListener('click', closePrdDrawer);

    var tabs = $$('.prd-drawer-tab', drawer);
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        tabs.forEach(function(t) { t.classList.remove('is-active'); });
        tab.classList.add('is-active');
        var tabName = tab.getAttribute('data-tab');
        if (tabName === 'page') loadPagePrdContent();
        else loadGlobalPrdContent();
      });
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePrdDrawer();
    });

    // Button
    var btn = document.createElement('button');
    btn.className = 'prd-drawer-btn';
    btn.id = 'prdDrawerBtn';
    btn.textContent = '📋 PRD 说明';
    btn.addEventListener('click', openPrdDrawer);
    document.body.appendChild(btn);
  }

  function openPrdDrawer() {
    document.getElementById('prdDrawerOverlay').classList.add('is-open');
    document.getElementById('prdDrawer').classList.add('is-open');
    var activeTab = document.querySelector('.prd-drawer-tab.is-active');
    if (activeTab && activeTab.getAttribute('data-tab') === 'page') {
      loadPagePrdContent();
    } else {
      loadGlobalPrdContent();
    }
  }

  function closePrdDrawer() {
    document.getElementById('prdDrawerOverlay').classList.remove('is-open');
    document.getElementById('prdDrawer').classList.remove('is-open');
  }

  function loadPagePrdContent() {
    var content = document.getElementById('prdDrawerContent');
    if (!content) return;
    content.innerHTML = PAGE_PRD_HTML;
  }

  function loadGlobalPrdContent() {
    var content = document.getElementById('prdDrawerContent');
    if (!content) return;
