<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 环慧慧EHS+</title>
  <style>
    :root {
      --color-brand: #1570EF; --color-brand-hover: #2E90FA; --color-brand-active: #175CD3;
      --color-danger: #F64C41; --color-success: #00C5C3;
      --color-text-primary: #444F66; --color-text-secondary: #758095;
      --color-text-placeholder: #9EA4AE; --color-text-disabled: #B3B9C4;
      --color-bg-page: #F7F8FA; --color-bg-surface: #FFFFFF; --color-bg-muted: #F7F8F9;
      --color-brand-light: #EFF8FF; --color-border: #DEDFE3; --color-divider: #E6E7EB;
      --radius-component: 4px;
      --font-family-ui: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      --shadow-topbar: 0 1px 4px rgba(31, 42, 55, .10);
      --focus-ring: 0 0 0 2px #D9E1FF;
      --color-topbar-bg: #00254A; --color-topbar-text: rgba(255,255,255,0.90); --color-topbar-sub: rgba(255,255,255,0.60);
      --color-sidebar-bg: #00254A; --color-sidebar-item-bg: #042240; --color-sidebar-active: #007AFF;
      --sidebar-width-new: 256px;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-width: 0; overflow: hidden; }
    body { margin: 0; color: var(--color-text-primary); background: var(--color-bg-page); font-family: var(--font-family-ui); font-size: 14px; line-height: 22px; letter-spacing: 0; }
    button, input, select { font: inherit; letter-spacing: 0; }
    button { border: 0; cursor: pointer; }
    img { display: block; object-fit: contain; }

    /* ==================== 顶部导航栏 ==================== */
    .menu-topbar { position: fixed; z-index: 30; top: 0; left: 0; width: 100%; height: 64px; display: flex; background: var(--color-topbar-bg); overflow: hidden; }
    .menu-logo { width: var(--sidebar-width-new); height: 64px; position: relative; display: flex; align-items: center; background: var(--color-topbar-bg); overflow: hidden; flex: 0 0 var(--sidebar-width-new); }
    .menu-logo::before { content:""; position:absolute; width:236px; height:236px; left:10px; top:-33px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.40) inset; border-radius:9999px; }
    .menu-logo::after { content:""; position:absolute; width:188px; height:188px; left:34px; top:-9px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.30) inset; border-radius:9999px; }
    .menu-logo-inner { position:absolute; width:138px; height:138px; left:59px; top:16px; background:#002449; box-shadow:0px 4px 10px rgba(0,0,0,0.20) inset; border-radius:9999px; z-index:0; }
    .menu-logo-icon { position:absolute; left:28px; top:8px; width:48px; height:48px; z-index:1; }
    .menu-logo-icon img { width:48px; height:48px; }
    .menu-logo-main { position:absolute; left:88px; top:16px; z-index:1; font-size:20px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-text); white-space:nowrap; }
    .menu-logo-brand { color:rgba(58,184,255,0.90); }
    .menu-logo-sub { position:absolute; left:87px; top:39px; z-index:1; font-size:12px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-sub); white-space:nowrap; }
    .menu-logo-sep { position:absolute; left:148px; top:27px; width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.30); }
    .menu-top-nav { flex:1; min-width:0; height:64px; display:flex; align-items:center; background:var(--color-topbar-bg); }
    .menu-top-track { height:64px; display:flex; align-items:center; gap:32px; padding:0 16px; }
    .menu-top-item { height:46px; display:inline-flex; align-items:center; padding:0; border:none; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; }
    .menu-top-item.is-active { border-bottom-color:var(--color-sidebar-active); }
    .menu-top-actions { height:64px; display:flex; align-items:center; padding:0 16px 0 12px; color:var(--color-topbar-text); font-size:12px; font-family:var(--font-family-ui); white-space:nowrap; flex-shrink:0; }
    .menu-user { display:inline-flex; align-items:center; gap:0; color:var(--color-topbar-text); font-size:12px; white-space:nowrap; }
    .menu-user-meta { height:24px; display:inline-flex; align-items:center; }

    /* ==================== 侧边导航菜单 ==================== */
    .menu-shell { position:fixed; z-index:20; top:64px; left:0; width:var(--sidebar-width-new); height:calc(100vh - 64px); display:flex; flex-direction:column; justify-content:flex-start; background:var(--color-sidebar-bg); box-shadow:0px 2px 8px rgba(0,0,0,0.25); }
    .menu-side-list { display:flex; flex-direction:column; margin:0; padding:0; overflow:hidden auto; scrollbar-width:thin; }
    .menu-side-list::-webkit-scrollbar { width:3px; }
    .menu-side-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:50px; }
    .menu-side-item { width:256px; height:52px; display:flex; align-items:center; gap:12px; padding:0 8px 0 24px; border:none; border-radius:0; background:var(--color-sidebar-bg); color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; }
    .menu-side-item:hover { background:rgba(255,255,255,0.06); }
    .menu-side-item img { width:20px; height:20px; flex:0 0 auto; }
    .menu-side-item .menu-side-arrow { width:16px; height:16px; flex:0 0 auto; margin-left:auto; margin-right:12px; }
    .menu-side-item .menu-side-arrow img { width:16px; height:16px; }
    .menu-side-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .menu-sublist { display:none; flex-direction:column; margin:0; padding:0; background:var(--color-sidebar-item-bg); }
    .menu-sublist.is-open { display:flex; }
    .menu-side-child { width:240px; height:36px; display:flex; align-items:center; margin:8px; padding:0 0 0 36px; border:none; border-radius:4px; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; white-space:nowrap; position:relative; }
    .menu-side-child::before { content:""; position:absolute; left:16px; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.40); }
    .menu-side-child:hover { background:rgba(255,255,255,0.08); }
    .menu-side-child.is-active { background:var(--color-sidebar-active); color:white; }
    .menu-side-child.is-active::before { background:white; }

    /* ==================== 面包屑栏 ==================== */
    .menu-breadcrumb { position:fixed; z-index:9; top:64px; left:var(--sidebar-width-new); right:0; height:50px; display:flex; align-items:center; padding:0 24px; background:white; box-shadow:0px 0px 8px 6px rgba(0,0,0,0.02); }
    .menu-breadcrumb-path { display:inline-flex; align-items:center; height:34px; }
    .menu-breadcrumb-icon { width:24px; height:34px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
    .menu-breadcrumb-icon svg { width:12px; height:12px; }
    .menu-breadcrumb-tag { display:inline-flex; align-items:center; height:34px; padding:0 0 0 8px; background:#E5F3FF; border-radius:0; }
    .menu-breadcrumb-tag span { color:#007AFF; font-size:14px; font-family:var(--font-family-ui); font-weight:400; margin:0 4px; }
    .menu-breadcrumb-next { width:24px; height:34px; display:inline-flex; align-items:center; justify-content:center; color:#9EA4AE; flex:0 0 auto; }

    /* ==================== CONTENT ==================== */
    .page-content { margin-left: var(--sidebar-width-new); padding: 126px 24px 24px; height: 100vh; overflow-y: auto; }
    .page-content::-webkit-scrollbar { width: 3px; }
    .page-content::-webkit-scrollbar-track { background: transparent; }
    .page-content::-webkit-scrollbar-thumb { border-radius: 50px; background: var(--color-divider); }

    /* ==================== 设置页面布局 ==================== */
    .settings-layout { display: flex; gap: 0; height: calc(100vh - 150px); }

    /* 左侧一级菜单 */
    .settings-nav { width: 180px; flex-shrink: 0; border-right: 1px solid var(--color-divider); padding-right: 20px; }
    .settings-nav-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); padding-bottom: 12px; margin-bottom: 8px; }
    .settings-nav-list { display: flex; flex-direction: column; gap: 2px; }
    .settings-nav-item { height: 40px; display: flex; align-items: center; padding: 0 12px; color: var(--color-text-secondary); font-size: 14px; cursor: pointer; border-radius: var(--radius-component); transition: all 150ms ease; user-select: none; }
    .settings-nav-item:hover { color: var(--color-brand); background: var(--color-brand-light); }
    .settings-nav-item.is-active { color: var(--color-brand); background: var(--color-brand-light); font-weight: 500; }

    /* 右侧面板 */
    .settings-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; padding-left: 24px; }

    /* 面板标题 */
    .section-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin: 0 0 20px 0; padding-bottom: 12px; border-bottom: 1px solid var(--color-divider); }

    /* 风险类型切换标签 */
    .risk-type-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--color-divider); }
    .risk-type-tab { height: 36px; padding: 0 20px; border: none; background: transparent; color: var(--color-text-secondary); font-size: 14px; font-weight: 400; cursor: pointer; transition: all 150ms ease; position: relative; }
    .risk-type-tab:hover { color: var(--color-brand); }
    .risk-type-tab.is-active { color: var(--color-brand); font-weight: 600; }
    .risk-type-tab.is-active::after { content: ""; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--color-brand); border-radius: 1px; }

    /* 字段配置表格 */
    .field-config-section { width: 100%; }
    .field-config-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .field-config-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); }

    .config-table { width: 100%; max-width: 580px; border-collapse: collapse; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 6px; }
    .config-table thead th { height: 44px; padding: 0 16px; background: var(--color-bg-muted); color: var(--color-text-secondary); font-size: 13px; font-weight: 500; text-align: left; border-bottom: 1px solid var(--color-border); white-space: nowrap; }
    .config-table thead th:first-child { padding-left: 20px; width: auto; }
    .config-table thead th.col-check { width: 90px; text-align: center; }
    .config-table thead th.col-check:last-child { width: 90px; }
    .config-table tbody td { height: 48px; padding: 0 16px; font-size: 14px; color: var(--color-text-primary); border-bottom: 1px solid var(--color-divider); }
    .config-table tbody td:first-child { padding-left: 20px; font-weight: 500; }
    .config-table tbody td.col-check { text-align: center; }
    .config-table tbody tr:last-child td { border-bottom: none; }
    .config-table tbody tr:hover { background: var(--color-brand-light); }

    /* 复选框 */
    .custom-checkbox { position: relative; width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; display: inline-flex; }
    .custom-checkbox input { opacity: 0; width: 0; height: 0; position: absolute; pointer-events: none; }
    .custom-checkbox-icon { position: absolute; inset: 0; border: 1.5px solid #D0D5DD; border-radius: 4px; background: white; transition: all 150ms ease; display: grid; place-items: center; }
    .custom-checkbox-icon svg { width: 12px; height: 12px; opacity: 0; transition: opacity 150ms ease; }
    .custom-checkbox input:checked + .custom-checkbox-icon { background: var(--color-brand); border-color: var(--color-brand); }
    .custom-checkbox input:checked + .custom-checkbox-icon svg { opacity: 1; }
    .custom-checkbox.is-disabled { cursor: not-allowed; opacity: 0.5; }
    .custom-checkbox.is-disabled .custom-checkbox-icon { background: #EDEEF0; border-color: #D0D5DD; }
    .custom-checkbox.is-disabled input { pointer-events: none; }

    /* 底部按钮 */
    .settings-footer { margin-top: 24px; display: flex; gap: 12px; justify-content: center; padding-top: 20px; border-top: 1px solid var(--color-divider); }

    /* 单选框 */
    .radio-group { display: flex; flex-direction: row; gap: 24px; }
    .radio-item { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--color-text-primary); user-select: none; }
    .radio-item input[type="radio"] { display: none; }
    .radio-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #D0D5DD; background: white; display: flex; align-items: center; justify-content: center; transition: all 150ms ease; flex-shrink: 0; }
    .radio-item input:checked + .radio-dot { border-color: var(--color-brand); }
    .radio-item input:checked + .radio-dot::after { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--color-brand); }
    .radio-item:hover .radio-dot { border-color: var(--color-brand); }

    /* 操作设置区域 */
    .operation-section { width: 100%; }
    .operation-section label.operation-label { display: block; font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 16px; }
    .btn { height: 36px; padding: 0 24px; border-radius: var(--radius-component); font-size: 14px; cursor: pointer; transition: all 150ms ease; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--color-brand); color: white; border: none; }
    .btn-primary:hover { background: var(--color-brand-hover); }
    .btn-default { background: white; color: var(--color-text-primary); border: 1px solid var(--color-border); }
    .btn-default:hover { border-color: var(--color-brand); color: var(--color-brand); }

    /* Toast */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #333; color: white; padding: 10px 24px; border-radius: 6px; font-size: 14px; z-index: 200; opacity: 0; transition: all 300ms ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ==================== PRD 角标标注 ==================== */
    .prd-badge {
      display: inline-block !important; vertical-align: top !important;
      background: rgb(250, 173, 20) !important; color: #fff !important;
      font-size: 10px !important; font-weight: 700 !important; line-height: 14px !important;
      padding: 0px 4px !important; border-radius: 2px !important;
      border: none !important; cursor: pointer !important;
      position: absolute !important; top: -8px; right: -4px;
      z-index: 9950 !important; white-space: nowrap !important;
      font-family: var(--font-family-ui) !important; letter-spacing: 0 !important;
      pointer-events: auto !important;
    }
    .prd-badge-hidden { display: none !important; }

    .prd-badge-inline {
      position: static !important; top: auto !important; right: auto !important;
      vertical-align: super !important; margin-left: 2px !important;
    }

    /* 浮窗 */
    .prd-tooltip {
      position: fixed !important; z-index: 9959 !important;
      width: 450px !important; max-width: 90vw !important;
      background: #FFFFFF !important; color: var(--color-text-primary) !important;
      border: 2px solid #1890ff !important; border-radius: 4px !important;
      box-shadow: 0 6px 16px rgba(0, 120, 255, 0.15) !important;
      font-size: 13px !important; line-height: 1.6 !important;
      padding: 0 !important; display: none;
      font-family: var(--font-family-ui) !important; text-align: left !important;
      pointer-events: auto !important;
    }
    .prd-tooltip-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid #E6E7EB;
      font-size: 14px; font-weight: 600; color: var(--color-text-primary);
    }
    .prd-tooltip-close {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: transparent; color: #9EA4AE;
      font-size: 16px; border-radius: 2px; transition: all 150ms;
    }
    .prd-tooltip-close:hover { background: #F0F0F0; color: #333; }
    .prd-tooltip-body {
      padding: 12px 14px; max-height: 360px; overflow-y: auto;
      color: var(--color-text-primary); line-height: 1.6;
    }
    .prd-tooltip-body p { margin: 0 0 8px; }
    .prd-tooltip-body ul, .prd-tooltip-body ol { margin: 4px 0 8px; padding-left: 18px; }
    .prd-tooltip-body li { margin-bottom: 4px; }
    .prd-tooltip-body strong { color: var(--color-text-primary); }
    .prd-tooltip-body blockquote {
      margin: 8px 0; padding: 6px 12px; border-left: 3px solid #D0D5DD;
      background: #F7F8FA; color: var(--color-text-secondary); font-size: 12px;
    }

    /* PRD 抽屉 */
    .prd-drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 9980; display: none; }
    .prd-drawer-overlay.show { display: block; }
    .prd-drawer {
      position: fixed; top: 0; right: -600px; width: 600px; height: 100vh;
      background: #FFFFFF; z-index: 9981; box-shadow: -4px 0 20px rgba(0,0,0,0.12);
      transition: right 300ms ease; display: flex; flex-direction: column;
    }
    .prd-drawer.open { right: 0; }
    .prd-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--color-divider); flex-shrink: 0;
    }
    .prd-drawer-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); }
    .prd-drawer-close {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer; border-radius: 4px;
      font-size: 20px; color: var(--color-text-secondary); transition: all 150ms;
    }
    .prd-drawer-close:hover { background: #F0F0F0; color: #333; }
    .prd-drawer-body {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
    }
    .prd-drawer-body h1 { font-size: 22px; margin: 0 0 16px; }
    .prd-drawer-body h2 { font-size: 18px; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--color-divider); }
    .prd-drawer-body h3 { font-size: 15px; margin: 18px 0 8px; }
    .prd-drawer-body p { margin: 0 0 10px; }
    .prd-drawer-body ul, .prd-drawer-body ol { margin: 6px 0 10px; padding-left: 20px; }
    .prd-drawer-body li { margin-bottom: 4px; }
    .prd-drawer-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .prd-drawer-body table th, .prd-drawer-body table td { border: 1px solid var(--color-border); padding: 6px 10px; text-align: left; }
    .prd-drawer-body table th { background: var(--color-bg-muted); font-weight: 500; }
    .prd-drawer-body code { background: #F7F8FA; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
    .prd-drawer-body pre { background: #F7F8FA; padding: 12px 16px; border-radius: 4px; overflow-x: auto; font-size: 12px; line-height: 1.5; }
    .prd-drawer-body blockquote { border-left: 3px solid #D0D5DD; padding: 6px 12px; margin: 10px 0; background: #F7F8FA; color: var(--color-text-secondary); }
    .prd-drawer-body hr { border: none; border-top: 1px solid var(--color-divider); margin: 20px 0; }
    .prd-drawer-body .badge-ref { display: inline-block; background: rgb(250,173,20); color: #fff; font-size: 10px; font-weight: 700; padding: 0 3px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    /* 页签栏 */
    .prd-drawer-tabs { display: flex; border-bottom: 1px solid var(--color-divider); background: #F7F8FA; padding: 0 20px; height: 42px; min-height: 42px; align-items: flex-end; gap: 0; }
    .prd-drawer-tab { height: 38px; padding: 0 20px; border: none; background: transparent; color: #758095; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 150ms; white-space: nowrap; }
    .prd-drawer-tab:hover { color: #444F66; }
    .prd-drawer-tab.active { color: #1570EF; border-bottom-color: #1570EF; font-weight: 500; }
    .prd-drawer-panel { display: none; flex: 1; overflow-y: auto; padding: 24px; font-size: 14px; line-height: 1.6; color: var(--color-text-primary); }
    .prd-drawer-panel.active { display: block; }
    .prd-drawer-panel::-webkit-scrollbar { width: 4px; }
    .prd-drawer-panel::-webkit-scrollbar-thumb { background: #DEDFE3; border-radius: 50px; }

    /* PRD 说明按钮 */
    .prd-doc-btn {
      position: fixed; top: 16px; right: 180px; z-index: 10000;
      height: 32px; padding: 0 16px; border-radius: 4px; border: 1px solid #1890ff;
      background: #EFF8FF; color: #1890ff; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 150ms;
    }
    .prd-doc-btn:hover { background: #D6EEFF; }

    /* 全局标注开关 */
    .badge-toggle-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 10001;
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: #307FE2; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(48,127,226,0.35); transition: all 200ms;
    }
    .badge-toggle-btn:hover { background: #1E6DD6; transform: scale(1.05); }
    .badge-toggle-btn svg { width: 20px; height: 20px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'base', securityLevel: 'loose' });</script>
</head>
<body>

<!-- ==================== 顶部导航栏 ==================== -->
<header class="menu-topbar" aria-label="顶部导航">
  <div class="menu-logo">

<script>
// ==================== 数据模型 ====================
const STORAGE_KEY = 'risk_control_industry_settings';
const OPERATION_STORAGE_KEY = 'risk_control_operation_settings';

// 风险类型
const RISK_TYPES = [
  { key: 'inherent', label: '固有风险' },
  { key: 'risk',     label: '作业风险' }
];

// 各风险类型下的字段顺序（用于渲染和遍历）
const ORDERED_FIELDS_BY_RISK_TYPE = {
  inherent: [
    { key: 'inherent_risk_type',   label: '固有风险类型' },
    { key: 'risk_location',        label: '风险点地点' },
    { key: 'risk_link',            label: '风险环节' },
    { key: 'risk_analysis_target', label: '风险分析对象' },
    { key: 'risk_describe',        label: '风险描述' }
  ],
  risk: [
    { key: 'risk_location',        label: '风险点地点' },
    { key: 'risk_link',            label: '风险环节' },
    { key: 'risk_analysis_target', label: '风险分析对象' },
    { key: 'risk_describe',        label: '风险描述' }
  ]
};

// 获取当前风险类型下的有序字段列表
function getFieldsForRiskType(riskTypeKey) {
  return ORDERED_FIELDS_BY_RISK_TYPE[riskTypeKey] || ORDERED_FIELDS_BY_RISK_TYPE.inherent;
}

// 默认配置：按风险类型存储，不区分公司
function makeDefaultConfig() {
  return {
    固有风险: {
      inherent_risk_type:   { show: true,  required: true  },
      risk_location:        { show: true,  required: true  },
      risk_link:            { show: true,  required: true  },
      risk_analysis_target: { show: false, required: false },
      risk_describe:        { show: true,  required: true  }
    },
    作业风险: {
      risk_location:        { show: true,  required: true  },
      risk_link:            { show: true,  required: true  },
      risk_analysis_target: { show: false, required: false },
      risk_describe:        { show: true,  required: true  }
    }
  };
}

// 加载持久化配置
function loadConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      const merged = makeDefaultConfig();
      for (const rtLabel of RISK_TYPES.map(r => r.label)) {
        if (parsed[rtLabel]) {
          const allFields = getFieldsForRiskType(
            RISK_TYPES.find(r => r.label === rtLabel)?.key || 'inherent'
          );
          for (const f of allFields) {
            if (parsed[rtLabel][f.key]) {
              merged[rtLabel][f.key] = {
                show:     !!parsed[rtLabel][f.key].show,
                required: !!parsed[rtLabel][f.key].required
              };
            }
          }
        }
      }
      return merged;
    }
  } catch (e) { /* ignore */ }
  return makeDefaultConfig();
}

let config = loadConfig();
let currentRiskTypeKey = 'inherent'; // 当前选中的风险类型 key
let currentMenu = 'display'; // 当前菜单：display | operation
let controlSupport = 'yes'; // 是否支持管控风险：yes | no

// ==================== DOM 引用 ====================
const riskTypeTabs    = document.getElementById('riskTypeTabs');
const fieldConfigBody = document.getElementById('fieldConfigBody');
const displayPanel    = document.getElementById('displayPanel');
const operationPanel  = document.getElementById('operationPanel');

// ==================== 初始化 ====================
function init() {
  loadOperationSettings();
  renderRiskTypeTabs();
  renderFieldTable();
  renderOperationPanel();
}

// ==================== 菜单切换 ====================
function switchMenu(menu) {
  currentMenu = menu;

  // 更新左侧 nav 高亮
  document.querySelectorAll('.settings-nav-item').forEach(item => {
    item.classList.toggle('is-active', item.dataset.menu === menu);
  });

  // 切换右侧面板
  if (menu === 'display') {
    displayPanel.style.display = '';
    operationPanel.style.display = 'none';
  } else if (menu === 'operation') {
    displayPanel.style.display = 'none';
    operationPanel.style.display = '';
    renderOperationPanel();
  }
}

// ==================== 渲染风险类型切换标签 ====================
function renderRiskTypeTabs() {
  let html = '';
  RISK_TYPES.forEach(rt => {
    const activeClass = rt.key === currentRiskTypeKey ? ' is-active' : '';
    html += `<button class="risk-type-tab${activeClass}" data-risk-type="${rt.key}" onclick="switchRiskType('${rt.key}')">${rt.label}</button>`;
  });
  html += '<span class="prd-badge" data-badge-id="2" style="top:4px;right:8px;">2</span>';
  riskTypeTabs.innerHTML = html;
  bindBadgeEvents();
}

// ==================== 切换风险类型 ====================
function switchRiskType(riskTypeKey) {
  currentRiskTypeKey = riskTypeKey;
  renderRiskTypeTabs();
  renderFieldTable();
}

// ==================== 获取当前配置（快捷访问） ====================
function getCurrentTypeConfig() {
  const rtLabel = RISK_TYPES.find(r => r.key === currentRiskTypeKey).label;
  return config[rtLabel];
}

// ==================== 渲染字段配置表格 ====================
function renderFieldTable() {
  const typeCfg = getCurrentTypeConfig();
  const fields = getFieldsForRiskType(currentRiskTypeKey);

  let html = '';

  fields.forEach(f => {
    const field = typeCfg[f.key];
    if (!field) return;
    const showChecked    = field.show     ? 'checked' : '';
    const requiredChecked = field.required ? 'checked' : '';
    const requiredDisabled = !field.show ? 'is-disabled' : '';

    html += `
      <tr data-field-key="${f.key}">
        <td>${f.label}</td>
        <td class="col-check">
          <label class="custom-checkbox chk-show">
            <input type="checkbox" ${showChecked} onchange="onShowChange('${f.key}', this.checked)">
            <span class="custom-checkbox-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="6 12 10 16 18 8"/></svg>
            </span>
          </label>
        </td>
        <td class="col-check">
          <label class="custom-checkbox chk-required ${requiredDisabled}">
            <input type="checkbox" ${requiredChecked} onchange="onRequiredChange('${f.key}', this.checked)" ${!field.show ? 'disabled' : ''}>
            <span class="custom-checkbox-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="6 12 10 16 18 8"/></svg>
            </span>
          </label>
        </td>
      </tr>`;
  });

  fieldConfigBody.innerHTML = html;
}

// ==================== 复选框联动逻辑 ====================
function onShowChange(fieldKey, checked) {
  const typeCfg = getCurrentTypeConfig();
  typeCfg[fieldKey].show = checked;

  if (!checked) {
    // 取消显示 → 同时取消必填
    typeCfg[fieldKey].required = false;
  }

  renderFieldTable();
}

function onRequiredChange(fieldKey, checked) {
  const typeCfg = getCurrentTypeConfig();
  if (!typeCfg[fieldKey].show) {
    return;
  }
  typeCfg[fieldKey].required = checked;
  renderFieldTable();
}

// ==================== 保存 ====================
function saveSettings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
  showToast();
}

// ==================== 操作设置 ====================
function loadOperationSettings() {
  try {
    const raw = localStorage.getItem(OPERATION_STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.controlSupport === 'yes' || parsed.controlSupport === 'no') {
        controlSupport = parsed.controlSupport;
      }
    }
  } catch (e) { /* ignore */ }
}

function renderOperationPanel() {
  const yesRadio = document.querySelector('#operationPanel input[value="yes"]');
  const noRadio  = document.querySelector('#operationPanel input[value="no"]');
  if (yesRadio) yesRadio.checked = (controlSupport === 'yes');
  if (noRadio)  noRadio.checked  = (controlSupport === 'no');
}

function onControlSupportChange(value) {
  controlSupport = value;
}

function saveOperationSettings() {
  localStorage.setItem(OPERATION_STORAGE_KEY, JSON.stringify({ controlSupport }));
  showToast();
}

// ==================== Toast ====================
function showToast(msg) {
  const toast = document.getElementById('saveToast');
  toast.textContent = msg || '保存成功！';
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// ==================== 启动 ====================
// init() 在文件末尾调用，确保所有变量已声明

// ==================== PRD 标注角标交互逻辑 ====================

// 角标内容数据（综合 风险设置_PRD.md + 风险管理与辨识_整体功能_PRD.md + 工贸在线接口对接_整体功能_PRD.md）
const BADGE_DATA = {
  1: {
    title: '[1] 左侧设置菜单 · 面板互斥切换',
    html: `<p><strong>菜单结构</strong>（页面PRD §2.1）：左侧设置导航包含两个互斥菜单项——「显示设置」（默认选中）和「操作设置」。</p><p><strong>菜单路径</strong>：安全 / 风险评估 / 设置</p><hr><p><strong>交互规则</strong>（页面PRD §4.2 / 整体PRD §9 规则6）：</p><ul><li>点击「显示设置」→ 展示显示设置面板（含风险类型 Tab + 字段配置表），隐藏操作设置面板</li><li>点击「操作设置」→ 展示操作设置面板（含管控开关单选项），隐藏显示设置面板</li><li>两个面板<strong>互斥切换</strong>，同一时间仅展示一个</li><li>当前选中菜单项高亮（蓝色背景 + 蓝色文字）</li></ul><hr><p><strong>角色权限</strong>（页面PRD §1.2 & §6 / 整体PRD §2）：</p><ul><li>仅<strong>系统管理员</strong>可操作，具有「风险设置」菜单权限</li><li>数据范围仅本企业（<code>societyCode</code>），不做跨企业配置同步</li><li>配置数据存储于浏览器端 <code>localStorage</code>，无后端权限校验</li></ul><hr><p><strong>页面加载流程</strong>（页面PRD §4.1）：</p><ol><li>页面加载时初始化两个面板数据和菜单状态</li><li>从 <code>localStorage</code> 读取已保存配置（<code>risk_control_industry_settings</code> 和 <code>risk_control_operation_settings</code>）</li><li>若无已保存数据，使用内置默认配置（<code>makeDefaultConfig()</code>）</li><li>默认展示「显示设置」面板 + 「固有风险」Tab</li></ol><hr><p><strong>整体PRD 业务规则</strong>（§9）：规则6-面板互斥切换；规则7-保存按钮居中，无恢复默认按钮</p>`
  },
  2: {
    title: '[2] 风险类型 Tab 切换',
    html: `<p><strong>核心设计</strong>（页面PRD §3.1）：配置以<strong>风险类型</strong>为维度，分为「固有风险」和「作业风险」两类，各自独立维护字段配置。</p><hr><p><strong>Tab 字段差异</strong>（页面PRD §3.1 分组1 / 整体PRD §9 规则3-5）：</p><ul><li><strong>固有风险 Tab</strong>：含 5 个字段——固有风险类型、风险点地点、风险环节、风险分析对象、风险描述</li><li><strong>作业风险 Tab</strong>：含 4 个字段——风险点地点、风险环节、风险分析对象、风险描述（无「固有风险类型」）</li><li><strong>固有风险类型</strong>字段仅当风险点类型为「固有风险」时显示（整体PRD 规则3）</li><li><strong>风险分析对象</strong>默认不展示且非必填（<code>show=false, required=false</code>），两个 Tab 均如此（整体PRD 规则5）</li></ul><hr><p><strong>交互规范</strong>（页面PRD §4.3）：</p><ul><li>点击 Tab 切换即刻生效，即时渲染 <code>≤100ms</code>（纯前端内存读取）</li><li>切换后字段配置表按该风险类型的字段顺序重新渲染</li></ul><hr><p><strong>存储结构</strong>（页面PRD §3.1 / 整体PRD §5.3.1）：</p><ul><li><strong>Key</strong>：<code>localStorage: risk_control_industry_settings</code></li><li>层级：风险类型名（<code>"固有风险"</code> / <code>"作业风险"</code>）→ 字段 key → <code>{ show, required }</code></li></ul><blockquote>整体PRD 存储模型含「工贸」行业级外层，当前页面按风险类型维度直接存储（功能等效）。</blockquote>`
  },

// ==================== 浮窗交互 ====================
const tooltip = document.getElementById('prdTooltip');
const tooltipTitle = document.getElementById('prdTooltipTitle');
const tooltipBody = document.getElementById('prdTooltipBody');
let activeBadgeId = null;
let tooltipTimer = null;

function showTooltip(badgeId, badgeEl) {
  if (activeBadgeId === badgeId) return;
  activeBadgeId = badgeId;
  clearTimeout(tooltipTimer);

  const data = BADGE_DATA[badgeId];
  if (!data) return;
  tooltipTitle.textContent = data.title;
  tooltipBody.innerHTML = data.html;
  tooltip.style.display = 'block';

  // 定位浮窗
  positionTooltip(badgeEl);
}

function positionTooltip(badgeEl) {
  const rect = badgeEl.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const tw = 450;

  let left = rect.right + 8;
  let top = rect.top - 4;

  // 右侧空间不足 → 翻到左侧
  if (left + tw > vw - 20) {
    left = rect.left - tw - 8;
  }
  // 底部溢出 → 上移
  if (top + 400 > vh) {
    top = Math.max(10, vh - 410);
  }
  // 顶部溢出
  if (top < 10) top = 10;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function closeTooltip() {
  tooltip.style.display = 'none';
  activeBadgeId = null;
}

// 绑定角标 hover 事件
function bindBadgeEvents() {
  document.querySelectorAll('.prd-badge').forEach(badge => {
    const badgeId = badge.getAttribute('data-badge-id');
    if (!badgeId) return;

    badge.addEventListener('mouseenter', () => {
      clearTimeout(tooltipTimer);
      showTooltip(badgeId, badge);
    });

    badge.addEventListener('mouseleave', () => {
      tooltipTimer = setTimeout(() => {
        // 检查鼠标是否已移到浮窗上
        if (!tooltip.matches(':hover')) {
          closeTooltip();
        }
      }, 200);
    });
  });

  // 浮窗自身：鼠标移入保持，移出关闭
  tooltip.addEventListener('mouseenter', () => {
    clearTimeout(tooltipTimer);
  });
  tooltip.addEventListener('mouseleave', () => {
    closeTooltip();
  });

  // 全局点击关闭
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.prd-badge') && !e.target.closest('.prd-tooltip')) {
      closeTooltip();
    }
  });
}

var prdDrawerOverlay = document.getElementById('prdDrawerOverlay');
var prdDrawerEl = document.getElementById('prdDrawer');
var prdDrawerClose = document.getElementById('prdDrawerClose');
var prdTabs = document.getElementById('prdDrawerTabs');
var prdPanelPage = document.getElementById('prdPanelPage');
var prdPanelOverallRisk = document.getElementById('prdPanelOverallRisk');
var prdPanelOverallApi = document.getElementById('prdPanelOverallApi');
var prdContentsLoaded = { page: false, 'overall-risk': false, 'overall-api': false };

function openPrdDrawer() {
  prdDrawerOverlay.classList.add('show');
  prdDrawerEl.classList.add('open');
  // 加载当前活跃页签内容
  var activeTab = prdTabs.querySelector('.prd-drawer-tab.active');
  if (activeTab) {
    loadPrdTabContent(activeTab.dataset.tab);
  }
}

function closePrdDrawer() {
  prdDrawerOverlay.classList.remove('show');
  prdDrawerEl.classList.remove('open');
}

function switchPrdTab(tabName) {
  prdTabs.querySelectorAll('.prd-drawer-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });
  prdPanelPage.classList.toggle('active', tabName === 'page');
  prdPanelOverallRisk.classList.toggle('active', tabName === 'overall-risk');
  prdPanelOverallApi.classList.toggle('active', tabName === 'overall-api');
  loadPrdTabContent(tabName);
}

function loadPrdTabContent(tabName) {
  if (prdContentsLoaded[tabName]) return;
  prdContentsLoaded[tabName] = true;

  if (tabName === 'page') {
    loadPagePrdContent();
  } else if (tabName === 'overall-risk') {
    loadOverallRiskPrdContent();
  } else if (tabName === 'overall-api') {
    loadOverallApiPrdContent();
  }
}

// ESC 关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && prdDrawerEl.classList.contains('open')) {
    closeTooltip();
    closePrdDrawer();
  }
});

prdDrawerClose.addEventListener('click', closePrdDrawer);
prdDrawerOverlay.addEventListener('click', function(e) {
  if (e.target === prdDrawerOverlay) closePrdDrawer();
});

prdTabs.addEventListener('click', function(e) {
  var tab = e.target.closest('.prd-drawer-tab');
  if (!tab) return;
  switchPrdTab(tab.dataset.tab);
});

> **按钮位置**：显示设置和操作设置的保存按钮均居中展示，位于面板底部。无「恢复默认」按钮——如需恢复默认配置，手动清除对应 \`localStorage\` key 即可。

## <span class="badge-ref">[1]</span><span class="badge-ref">[2]</span><span class="badge-ref">[3]</span> 4. 交互设计

### 4.1 页面加载交互

1. 页面加载时初始化两个面板数据和菜单状态
2. 从 \`localStorage\` 读取已保存配置（\`risk_control_industry_settings\` 和 \`risk_control_operation_settings\`）
3. 若 \`localStorage\` 无数据，使用内置默认配置（\`makeDefaultConfig()\`）
4. 默认展示「显示设置」面板 + 「固有风险」Tab

### 4.2 左侧菜单切换

- 点击「显示设置」→ 展示显示设置面板（含风险类型 Tab + 字段配置表），隐藏操作设置面板
- 点击「操作设置」→ 展示操作设置面板（含管控开关单选项），隐藏显示设置面板
- 两个面板**互斥切换**，同一时间仅展示一个
- 当前选中菜单项高亮（蓝色背景 + 蓝色文字）

### 4.3 风险类型 Tab 切换

- 点击「固有风险」/「作业风险」Tab → 切换下方的字段配置表格
- 切换时即时渲染，\`≤100ms\`（纯前端内存读取）
- 切换后字段配置表重新按该风险类型的字段顺序渲染

### 4.4 字段联动与动态显隐

<span class="badge-ref">[3]</span> **核心联动规则：**

| 触发 | 联动行为 |
|------|----------|
| 取消「是否显示」勾选 | 该行「是否必填」自动取消 + 复选框置灰不可点击 + 复选框样式变灰（添加 \`.is-disabled\`，\`opacity: 0.5\`） |
| 勾选「是否显示」 | 「是否必填」恢复可编辑状态，去除置灰样式 |
| 「是否显示 = OFF」时点击「是否必填」 | 无反应（\`disabled\` 属性阻止） |

> 联动在前端 \`onShowChange()\` 和 \`onRequiredChange()\` 中实时处理，无需保存即可预览效果。

### 4.5 操作反馈

- **保存成功**：Toast 居中提示「保存成功！」，2s 后自动消失
- **配置持久化**：保存操作直接读写 \`localStorage\`，无需接口调用
- **配置生效**：风险管理与辨识页面**下次加载时**读取 \`localStorage\` 配置，无需手动刷新

## 5. 异常处理

| 异常场景 | 处理方式 |
|----------|----------|
| \`localStorage\` 不可用或被禁用 | 使用默认配置（\`makeDefaultConfig()\`），功能正常运行但不持久化 |
| \`localStorage\` 数据格式异常（JSON 解析失败） | 静默回退到默认配置，不弹出错误提示 |
| \`localStorage\` 写入失败（如配额已满） | Toast 提示「保存失败，请重试」 |
| 页面未找到对应 DOM 元素 | 控制台错误，需页面重新加载 |

## <span class="badge-ref">[1]</span> 1. 引言

**目标：** 以满足工贸在线数据上报合规要求为核心驱动力，完成系统字段映射改造、管控流程与数据推送联动、以及字段配置能力建设。

本 PRD 作为**功能级整体需求说明**，统一定义风险管理与辨识功能的全局业务规则、数据模型、流程与非功能需求。

### 1.2 用户价值

### 7.1 性能

| 指标 | 要求 |

| 风险列表首屏加载 | ≤2s |

- 权限校验：前端菜单权限控制入口显隐；后端CUD权限校验

- XSS防护：所有用户输入HTML编码处理

Chrome 90+/Edge 90+/Firefox 88+，最低1280×720，推荐1920×1080

### 7.4 可维护性

- 配置热生效(localStorage变更后下次加载自动同步，无需重启)

### 5.2 风险管控数据→工贸上报

\`\`\`mermaid
flowchart TD
    A[新增风险] --> B[风险辨识]
    B --> C[进行管控]

// 简易 Markdown 解析器
function parseMarkdown(md) {
  let html = md;

  // 代码块 - mermaid 特殊处理
  html = html.replace(/```mermaid\n([\s\S]*?)```/g, '<pre class="mermaid">$1</pre>');
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 引用
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // 分割线
  html = html.replace(/^---$/gm, '<hr>');
  // 粗体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 斜体
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 无序列表
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // 表格
  html = html.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g, (match, header, rows) => {
    const hcells = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rhtml = rows.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${hcells}</tr></thead><tbody>${rhtml}</tbody></table>`;
  });
  // badge ref
  html = html.replace(/<span class="badge-ref">\[(\d+)\]<\/span>/g, '<span class="badge-ref">[$1]</span>');
  // 段落
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<(h[1-4]|table|ul|ol|hr|blockquote|pre)/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return html;
}
