<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工贸安全 · 页面导航</title>
  <style>
    /* ==================== 2.0 Design Tokens ==================== */
    :root {
      --color-brand: #1570EF;
      --color-brand-hover: #2E90FA;
      --color-brand-active: #175CD3;
      --color-danger: #F64C41;
      --color-text-primary: #444F66;
      --color-text-secondary: #758095;
      --color-text-placeholder: #9EA4AE;
      --color-text-disabled: #B3B9C4;
      --color-bg-page: #F7F8FA;
      --color-bg-surface: #FFFFFF;
      --color-bg-muted: #F7F8F9;
      --color-brand-light: #EFF8FF;
      --color-border: #DEDFE3;
      --color-divider: #E6E7EB;
      --radius-component: 4px;
      --font-family-ui: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      --shadow-topbar: 0 1px 4px rgba(31, 42, 55, .10);
      --shadow-brand: 0 1px 5px rgba(21,112,239,.05), 0 4px 2.5px rgba(21,112,239,.08), 0 2px 2px rgba(21,112,239,.25);
      --focus-ring: 0 0 0 2px #D9E1FF;
      --transition: 150ms ease;
      --sidebar-width: 240px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font-family-ui);
      font-size: 14px;
      line-height: 22px;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ==================== SIDEBAR 2.0 ==================== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--color-bg-surface);
      box-shadow: 0 6px 30px 5px rgba(67, 82, 111, 0.05);
      flex-shrink: 0;
      user-select: none;
      z-index: 20;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-component);
      background: var(--color-brand);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .sidebar-logo svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .sidebar-title {
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar-title-brand {
      color: var(--color-brand);
    }

    .sidebar-subtitle {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 20px;
      font-weight: 400;
    }

    /* ---- NAV LIST ---- */
    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 8px 16px;
      overflow-y: auto;
    }

    .sidebar-nav::-webkit-scrollbar {
      width: 3px;
    }

    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      border-radius: 50px;
      background: var(--color-divider);
    }

    /* ---- NAV GROUP HEADER ---- */
    .nav-group-header {
      width: 224px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      border-radius: var(--radius-component);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background-color var(--transition), color var(--transition);
    }

    .nav-group-header:hover {
      background: var(--color-bg-muted);
      color: var(--color-text-primary);
    }

    .nav-group-header .arrow {
      width: 16px;
      height: 16px;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .nav-group-header .arrow svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .nav-group-header .arrow.open {
      transform: rotate(90deg);
    }

    .nav-group-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .nav-group-header .badge {
      background: var(--color-bg-muted);
      color: var(--color-text-secondary);
      font-size: 11px;
      line-height: 18px;
      padding: 0 6px;
      border-radius: 10px;
      font-weight: 400;
    }

    /* ---- NAV CHILDREN ---- */
    .nav-children {
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    .nav-children.expanded {
      display: flex;
    }

    /* ---- NAV ITEM ---- */
    .nav-item {
      width: 224px;
      height: 40px;
      display: flex;
      align-items: center;
      padding: 9px 16px;
      border-radius: var(--radius-component);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      gap: 10px;
      text-align: left;
      white-space: nowrap;
      transition: background-color var(--transition), color var(--transition);
    }

    .nav-item:hover {
      background: var(--color-bg-muted);
      color: var(--color-text-primary);
    }

    .nav-item.active {
      background: var(--color-brand);
      color: #fff;
      box-shadow: var(--shadow-brand);
    }

    .nav-item .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--color-text-placeholder);
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .nav-item.active .nav-dot {
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }

    .nav-item.level-1 {
      padding-left: 16px;
    }

    .nav-item.level-2 {
      padding-left: 48px;
    }

    .nav-item.level-3 {
      padding-left: 60px;
    }

    /* ---- SUBGROUP HEADER ---- */
    .nav-subgroup-header {
      width: 224px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 32px;
      border-radius: var(--radius-component);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      text-align: left;
      transition: background-color var(--transition), color var(--transition);
      font-weight: 500;
    }

    .nav-subgroup-header:hover {
      background: var(--color-bg-muted);
      color: var(--color-text-primary);
    }

    .nav-subgroup-header .arrow {
      width: 14px;
      height: 14px;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .nav-subgroup-header .arrow svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
    }

    .nav-subgroup-header .arrow.open {
      transform: rotate(90deg);
    }

    .nav-subgroup-header .label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* divider */
    .nav-divider {
      width: 208px;
      height: 1px;
      background: var(--color-divider);
      margin: 8px 12px;
      flex-shrink: 0;
    }

    /* sidebar footer */
    .sidebar-footer {
      width: 240px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 9px 16px 9px 24px;
      border-top: 1px solid var(--color-divider);
      background: var(--color-bg-surface);
      color: var(--color-text-secondary);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ---- RESIZER ---- */
    .sidebar-resizer {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background var(--transition);
      position: relative;
      z-index: 21;
    }

    .sidebar-resizer:hover,
    .sidebar-resizer:active {
      background: var(--color-brand);
    }

    /* ==================== MAIN CONTENT ==================== */
    .main-content {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-page);
      overflow: hidden;
    }

    .content-toolbar {
      height: 48px;
      min-height: 48px;
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
    }

    .content-toolbar .breadcrumb {
      font-size: 13px;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .content-toolbar .breadcrumb .sep {
      color: var(--color-text-placeholder);
    }

    .content-toolbar .breadcrumb .current {
      color: var(--color-text-primary);
      font-weight: 500;
    }

    .content-frame-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .content-frame-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-bg-surface);
    }

    .content-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--color-text-placeholder);
      font-size: 14px;
      pointer-events: none;
    }

    .content-placeholder svg {
      width: 64px;
      height: 64px;
      opacity: 0.15;
    }

    .content-placeholder.hidden {
      display: none;
    }

    /* ==================== PRD 说明按钮 ==================== */
    .toolbar-info-btn {
      height: 32px;
      padding: 0 16px;
      border-radius: 4px;
      border: 1px solid #1890ff;
      background: #EFF8FF;
      color: #1890ff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 150ms;
      margin-left: auto;
      flex-shrink: 0;
    }
    .toolbar-info-btn:hover { background: #D6EEFF; }
    .toolbar-info-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ==================== PRD 抽屉 ==================== */
    .prd-drawer-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.45); z-index: 9980; display: none;
    }
    .prd-drawer-overlay.show { display: block; }

    .prd-drawer {
      position: fixed; top: 0; right: -650px; width: 650px; height: 100vh;
      background: #FFFFFF; z-index: 9981; box-shadow: -4px 0 20px rgba(0,0,0,0.12);
      transition: right 300ms ease; display: flex; flex-direction: column;
    }
    .prd-drawer.open { right: 0; }

    .prd-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid #E6E7EB; flex-shrink: 0;
    }
    .prd-drawer-title { font-size: 16px; font-weight: 600; color: #444F66; }

    .prd-drawer-close {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; cursor: pointer; border-radius: 4px;
      font-size: 20px; color: #758095; transition: all 150ms;
    }
    .prd-drawer-close:hover { background: #F0F0F0; color: #333; }

    .prd-drawer-body {
      flex: 1; overflow-y: auto; padding: 24px; font-size: 14px; line-height: 1.6; color: #444F66;
    }
    .prd-drawer-body::-webkit-scrollbar { width: 4px; }
    .prd-drawer-body::-webkit-scrollbar-thumb { background: #DEDFE3; border-radius: 50px; }

    .prd-drawer-body h1 { font-size: 22px; margin: 0 0 16px; }
    .prd-drawer-body h2 { font-size: 18px; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #E6E7EB; }
    .prd-drawer-body h3 { font-size: 15px; margin: 18px 0 8px; }
    .prd-drawer-body p { margin: 0 0 10px; }
    .prd-drawer-body ul, .prd-drawer-body ol { margin: 6px 0 10px; padding-left: 20px; }
    .prd-drawer-body li { margin-bottom: 4px; }
    .prd-drawer-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .prd-drawer-body table th, .prd-drawer-body table td { border: 1px solid #DEDFE3; padding: 6px 10px; text-align: left; }
    .prd-drawer-body table th { background: #F7F8F9; font-weight: 500; }
    .prd-drawer-body code { background: #F7F8FA; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
    .prd-drawer-body pre { background: #F7F8FA; padding: 12px 16px; border-radius: 4px; overflow-x: auto; font-size: 12px; line-height: 1.5; }
    .prd-drawer-body blockquote { border-left: 3px solid #D0D5DD; padding: 6px 12px; margin: 10px 0; background: #F7F8FA; color: #758095; }
    .prd-drawer-body hr { border: none; border-top: 1px solid #E6E7EB; margin: 20px 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'base', securityLevel: 'loose' });</script>
</head>
<body>

<div class="app-container">

  <!-- ==================== SIDEBAR ==================== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="sidebar-title">环慧慧<span class="sidebar-title-brand">EHS+</span></div>
        <div class="sidebar-subtitle">Enterprise Edition</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <!-- ===== 一、电脑端 ===== -->
      <div class="nav-group-header" onclick="toggleGroup('pc')">
        <span class="arrow open" id="arrow-pc">
          <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </span>
        <span class="nav-group-label">一、电脑端</span>
        <span class="badge">3页</span>
      </div>

      <div class="nav-children expanded" id="children-pc">

        <!-- 企业信息配置 -->
        <div class="nav-item level-2" data-page="企业信息配置" data-file="企业信息配置_20250616.html" onclick="switchPage(this)">
          <span class="nav-dot"></span>企业信息配置
        </div>

        <!-- 风险管理与辨识 -->
        <div class="nav-item level-2" data-page="风险管理与辨识" data-file="风险管理与辨识.html" onclick="switchPage(this)">
          <span class="nav-dot"></span>风险管理与辨识
        </div>

        <!-- 风险设置 -->
        <div class="nav-item level-2" data-page="风险设置" data-file="风险设置.html" onclick="switchPage(this)">
          <span class="nav-dot"></span>风险设置
        </div>

      </div>

      <div class="nav-divider"></div>

      <!-- ===== 二、小程序 ===== -->
      <div class="nav-group-header" onclick="toggleGroup('miniapp')">
        <span class="arrow open" id="arrow-miniapp">
          <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </span>
        <span class="nav-group-label">二、小程序</span>
        <span class="badge">0页</span>
      </div>

      <div class="nav-children expanded" id="children-miniapp">
      </div>

    </nav>

    <div class="sidebar-footer">环慧慧EHS+ © 2026</div>
  </aside>

  <!-- resizer -->
  <div class="sidebar-resizer" id="resizer"></div>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="main-content">
    <div class="content-toolbar">
      <div class="breadcrumb">
        环慧慧EHS+ <span class="sep">›</span>
        <span id="breadcrumb-platform" class="current">电脑端</span>
        <span class="sep">›</span>
        <span id="breadcrumb-page" class="current">风险管理与辨识</span>
      </div>
      <button class="toolbar-info-btn" id="infoBtn" title="查看接口对接说明">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        说明
      </button>
    </div>

    <div class="content-frame-wrapper">
      <div class="content-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        <span>请从左侧菜单选择页面查看</span>
      </div>
      <iframe id="content-frame" src="风险管理与辨识.html" onload="onFrameLoad()"
              style="display:block;"></iframe>
    </div>
  </main>

  <!-- ==================== PRD 说明抽屉 ==================== -->
  <div class="prd-drawer-overlay" id="prdDrawerOverlay"></div>
  <div class="prd-drawer" id="prdDrawer">
    <div class="prd-drawer-header">
      <span class="prd-drawer-title">工贸在线接口对接 · 整体功能说明</span>
      <button class="prd-drawer-close" id="prdDrawerClose" title="关闭">×</button>
    </div>
    <div class="prd-drawer-body" id="prdDrawerBody"></div>
  </div>

</div>

<script>
  // ===== STATE =====
  const state = {
    groups: { pc: true, miniapp: true },
    subgroups: { 'pc-risk': true }
  };

  // ===== TOGGLE GROUP =====
  function toggleGroup(groupId) {
    state.groups[groupId] = !state.groups[groupId];
    const children = document.getElementById('children-' + groupId);
    const arrow = document.getElementById('arrow-' + groupId);

    if (state.groups[groupId]) {
      children.classList.add('expanded');
      arrow.classList.add('open');
    } else {
      children.classList.remove('expanded');
      arrow.classList.remove('open');
    }
  }

  // ===== TOGGLE SUBGROUP =====
  function toggleSubGroup(subGroupId) {
    state.subgroups[subGroupId] = !state.subgroups[subGroupId];
    const children = document.getElementById('children-' + subGroupId);
    const arrow = document.getElementById('arrow-' + subGroupId);

    if (state.subgroups[subGroupId]) {
      children.classList.add('expanded');
      arrow.classList.add('open');
    } else {
      children.classList.remove('expanded');
      arrow.classList.remove('open');
    }
  }

  // ===== SWITCH PAGE =====
  function switchPage(el) {
    document.querySelectorAll('.nav-item.active').forEach(item => item.classList.remove('active'));
    el.classList.add('active');

    const pageName = el.getAttribute('data-page');
    const fileName = el.getAttribute('data-file');

    document.getElementById('placeholder').classList.add('hidden');
    const frame = document.getElementById('content-frame');
    frame.style.display = 'block';
    frame.src = fileName;

    const platformEl = document.getElementById('breadcrumb-platform');
    const pageEl = document.getElementById('breadcrumb-page');

    if (fileName.includes('小程序')) {
      platformEl.textContent = '小程序';
    } else {
      platformEl.textContent = '电脑端';
    }
    pageEl.textContent = pageName;

    localStorage.setItem('gzgm-active-page', fileName);
    localStorage.setItem('gzgm-active-page-name', pageName);
    localStorage.setItem('gzgm-active-platform', platformEl.textContent);
  }

  function onFrameLoad() {}

  // ===== RESIZER =====
  (function() {
    const resizer = document.getElementById('resizer');
    const sidebar = document.querySelector('.sidebar');
    let startX, startWidth;

    resizer.addEventListener('mousedown', function(e) {
      startX = e.clientX;
      startWidth = sidebar.offsetWidth;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    function onMouseMove(e) {
      const dx = e.clientX - startX;
      const newWidth = startWidth + dx;
      if (newWidth >= 200 && newWidth <= 400) {
        sidebar.style.width = newWidth + 'px';
        sidebar.style.minWidth = newWidth + 'px';
        document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
      }
    }

    function onMouseUp() {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  })();

  // ===== INIT =====
  (function init() {
    const savedFile = localStorage.getItem('gzgm-active-page');
    const savedName = localStorage.getItem('gzgm-active-page-name');
    const savedPlatform = localStorage.getItem('gzgm-active-platform');

    if (savedFile && savedName) {
      const target = document.querySelector(`.nav-item[data-file="${savedFile}"]`);
      if (target) {
        document.querySelectorAll('.nav-item.active').forEach(item => item.classList.remove('active'));
        target.classList.add('active');
        document.getElementById('placeholder').classList.add('hidden');
        const frame = document.getElementById('content-frame');
        frame.style.display = 'block';
        frame.src = savedFile;
        document.getElementById('breadcrumb-page').textContent = savedName;
        if (savedPlatform) document.getElementById('breadcrumb-platform').textContent = savedPlatform;
      }
    }
  })();

  // ==================== PRD 说明抽屉 ====================
  const prdOverlay = document.getElementById('prdDrawerOverlay');
  const prdDrawer = document.getElementById('prdDrawer');
  const prdBody = document.getElementById('prdDrawerBody');
  let prdLoaded = false;

  function openPrdDrawer() {
    prdOverlay.classList.add('show');
    prdDrawer.classList.add('open');
    if (!prdLoaded) {
      prdBody.innerHTML = parseMarkdown(prdMdContent);
      if (typeof mermaid !== 'undefined') {
        mermaid.run({ nodes: prdBody.querySelectorAll('pre.mermaid') });
      }
      prdLoaded = true;
    }
  }

  function closePrdDrawer() {
    prdOverlay.classList.remove('show');
    prdDrawer.classList.remove('open');
  }

  document.getElementById('infoBtn').addEventListener('click', openPrdDrawer);
  document.getElementById('prdDrawerClose').addEventListener('click', closePrdDrawer);

  // Markdown解析器
  function parseMarkdown(md) {
    var html = md;
    // mermaid
    html = html.replace(/\x60\x60\x60mermaid\n([\s\S]*?)\x60\x60\x60/g, '<pre class="mermaid">$1</pre>');
    html = html.replace(/\x60\x60\x60(\w*)\n([\s\S]*?)\x60\x60\x60/g, '<pre><code>$2</code></pre>');
    // 行内代码
    html = html.replace(/\x60([^\x60]+)\x60/g, '<code>$1</code>');
    // 标题
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // 引用
    html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    // 分割线
    html = html.replace(/^---$/gm, '<hr>');
    // 粗体
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // 斜体
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // 无序列表
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // 表格
    html = html.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g, function(match, header, rows) {
      var hcells = header.split('|').filter(function(c) { return c.trim(); }).map(function(c) { return '<th>' + c.trim() + '</th>'; }).join('');
      var rhtml = rows.trim().split('\n').map(function(row) {
        var cells = row.split('|').filter(function(c) { return c.trim(); }).map(function(c) { return '<td>' + c.trim() + '</td>'; }).join('');
        return '<tr>' + cells + '</tr>';
      }).join('');
      return '<table><thead><tr>' + hcells + '</tr></thead><tbody>' + rhtml + '</tbody></table>';
    });
    // 段落
    html = html.split('\n\n').map(function(block) {
      block = block.trim();
      if (!block) return '';
      if (/^<(h[1-4]|table|ul|ol|hr|blockquote|pre)/.test(block)) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');
    return html;
  }

    '| # | 接口参数 | 含义 | 映射状态 | 系统字段 |\n' +

    '### 8.5 隐患五落实（implementFive）五项明细\n' +
    '\n' +
    '`implementFive` 为固定长度 5 的字符串数组，按索引对应五落实内容：\n' +
    '\n' +
    '| 索引 | 落实项 | 含义 | 对应环慧慧字段 | 数据来源 |\n' +
    '|:---:|--------|------|----------------|----------|\n' +
    '| `[0]` | **整改目标** | 与整改措施填写相同内容 | `rectifierDesc`（整改措施详情） | 复用整改措施内容 |\n' +
    '| `[1]` | **整改时限** | 计划完成整改的截止日期 | `planRectifierTime`（计划完成日期） | 隐患整改阶段填写 |\n' +
    '| `[2]` | **整改措施** | 具体的整改方案和实施步骤 | `rectifierDesc`（整改措施详情） | 隐患整改进展阶段填写 |\n' +
    '| `[3]` | **整改责任** | 负责整改的责任人 | `rectifierUserName`（整改责任人） | 隐患整改进展阶段指定 |\n' +
    '| `[4]` | **整改资金** | 整改所需资金 | — | 固定传 `"0"` |\n' +
    '\n' +
    '**数据组装规则：**\n' +
    '\n' +
    '- 5 项按索引顺序组装为字符串数组，缺一不可\n' +
    '- `[0]` 整改目标 与 `[2]` 整改措施 填写相同内容，均取自 `rectifierDesc`\n' +
    '- `[4]` 整改资金 固定传 `"0"`（环慧慧系统无独立资金字段）\n' +
    '- 组装时机：隐患闭环完结（复查通过）触发推送时，从隐患记录中提取各阶段数据组装\n' +
    '\n' +
    '**组装示例：**\n' +
    '\n' +
    '```json\n' +
    '"implementFive": [\n' +

    '  "2026-06-20",                       // [1] 整改时限（计划完成日期）\n' +
    '  "采购合规电缆，由电工班组专业更换",  // [2] 整改措施（同[0]）\n' +
    '  "张三",                             // [3] 整改责任（整改责任人）\n' +
    '  "0"                                 // [4] 整改资金（固定传"0"）\n' +
    ']\n' +
    '```\n' +
